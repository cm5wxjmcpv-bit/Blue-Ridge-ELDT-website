<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CDL Training - Test</title>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <style>
    body { font-family: system-ui, Arial; padding: 24px; max-width: 820px; margin: 0 auto; }
    button, input { padding: 12px; font-size: 16px; }
    .small { color:#555; font-size: 13px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .question { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #eee; }
    .question:last-child { border-bottom: 0; }
    .option { display:block; margin:8px 0; }
  </style>
</head>
<body>
  <h2 id="testTitle">Test</h2>
  <div class="small" id="who"></div>
  <p class="small"><a href="modules.html">← Back to Modules</a></p>

  <div id="lock" class="card">Checking if test is unlocked…</div>

  <div id="test" class="card" style="display:none;">
    <div class="small" style="margin-bottom:12px;">
      25 questions · Multiple choice · Passing score: <b id="passScoreLabel">80%</b>
    </div>

    <form id="quizForm"></form>

    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="submit" type="button">Submit</button>
      <button id="retake" type="button">Retake</button>
    </div>

    <div id="result" style="margin-top:12px;"></div>
  </div>

  <script>
    const username = requireAuth();
    document.getElementById("who").textContent = `Signed in as ${username}`;

    const TEST_TITLE = "Defensive Driving / CMV Operations Comprehensive Test";
    const PASSING_SCORE = 80;

    const QUESTIONS = [
      { question: "What are the three main categories of controls on a CMV?", options: ["Engine, braking, steering", "Engine, primary, secondary", "Mechanical, electrical, hydraulic", "Driver, vehicle, cargo"], correctIndex: 1 },
      { question: "Engine controls are used for which of the following?", options: ["Steering and braking", "Starting/stopping and maintaining speed", "Cargo securement", "Mirror adjustment"], correctIndex: 1 },
      { question: "How long should a diesel engine warm up in cold weather?", options: ["1–2 minutes", "2–3 minutes", "5–10 minutes", "15 minutes"], correctIndex: 2 },
      { question: "What is another name for an engine retarder?", options: ["Cruise assist", "Jake brake", "Air brake", "Compression valve"], correctIndex: 1 },
      { question: "Engine retarders are primarily used for:", options: ["Increasing speed", "Parking", "Steep downgrades", "Fuel efficiency"], correctIndex: 2 },
      { question: "Visual search is best defined as:", options: ["Looking straight ahead", "Checking mirrors only", "Scanning for objects and hazards", "Watching traffic lights"], correctIndex: 2 },
      { question: "How far ahead should you scan at highway speeds?", options: ["100 feet", "5 seconds", "12–15 seconds", "1 mile"], correctIndex: 2 },
      { question: "Proper scanning includes:", options: ["Only forward view", "Only mirrors", "Internal and external areas", "Only gauges"], correctIndex: 2 },
      { question: "Why is scanning distance important?", options: ["Improves fuel economy", "Helps spot hazards early", "Reduces tire wear", "Improves engine life"], correctIndex: 1 },
      { question: "What is “overdriving your headlights”?", options: ["Driving with high beams", "Driving faster than you can see", "Driving at night", "Using fog lights incorrectly"], correctIndex: 1 },
      { question: "Why is hazard perception important?", options: ["Saves fuel", "Prevents hazards from becoming dangers", "Reduces maintenance", "Improves comfort"], correctIndex: 1 },
      { question: "On average, how many hazards are present per mile?", options: ["10", "25", "50", "100"], correctIndex: 3 },
      { question: "Defensive driving means:", options: ["Driving aggressively", "Driving slowly at all times", "Driving to save lives, time, and money", "Avoiding highways"], correctIndex: 2 },
      { question: "Increasing following distance gives you more:", options: ["Fuel efficiency", "Space to react", "Speed", "Horsepower"], correctIndex: 1 },
      { question: "Which is an example of a hazard clue?", options: ["Clear skies", "Brake lights ahead", "Empty road", "Green lights"], correctIndex: 1 },
      { question: "Which inspection is the most comprehensive?", options: ["Level II", "Level III", "Level I", "Level V"], correctIndex: 2 },
      { question: "A Level I inspection includes:", options: ["Driver only", "Vehicle only", "Cargo only", "Driver, vehicle, and cargo"], correctIndex: 3 },
      { question: "A Level II inspection excludes:", options: ["Driver", "Cargo", "Under-vehicle components", "Paperwork"], correctIndex: 2 },
      { question: "A Level III inspection focuses on:", options: ["Cargo", "Vehicle", "Driver only", "Engine only"], correctIndex: 2 },
      { question: "A Level V inspection is:", options: ["Driver only", "Vehicle only without driver", "Cargo only", "Emergency inspection"], correctIndex: 1 },
      { question: "Loose cargo can:", options: ["Improve fuel efficiency", "Increase speed", "Cause injury or death", "Reduce wear"], correctIndex: 2 },
      { question: "Who is responsible for cargo securement?", options: ["Dispatcher", "Mechanic", "Driver", "Inspector"], correctIndex: 2 },
      { question: "What is the federal maximum GCWR?", options: ["60,000 lbs", "70,000 lbs", "80,000 lbs", "90,000 lbs"], correctIndex: 2 },
      { question: "When must cargo be rechecked after starting a trip?", options: ["10 miles", "25 miles", "50 miles", "100 miles"], correctIndex: 2 },
      { question: "Cargo must be secured using:", options: ["Any available material", "Only straps", "Proper securement systems", "Rope only"], correctIndex: 2 }
    ];

    const lock = document.getElementById("lock");
    const test = document.getElementById("test");
    const result = document.getElementById("result");
    const quizForm = document.getElementById("quizForm");
    const submitBtn = document.getElementById("submit");
    const retakeBtn = document.getElementById("retake");

    document.getElementById("testTitle").textContent = TEST_TITLE;

    function renderQuestions() {
      quizForm.innerHTML = "";

      QUESTIONS.forEach((q, qIndex) => {
        const wrapper = document.createElement("div");
        wrapper.className = "question";

        const prompt = document.createElement("p");
        prompt.innerHTML = `<b>Question ${qIndex + 1}:</b> ${q.question}`;
        wrapper.appendChild(prompt);

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "option";
          label.innerHTML = `
            <input type="radio" name="q${qIndex}" value="${optIndex}">
            ${opt}
          `;
          wrapper.appendChild(label);
        });

        quizForm.appendChild(wrapper);
      });
    }

    function getSelections() {
      return QUESTIONS.map((_, i) => {
        const selected = quizForm.querySelector(`input[name="q${i}"]:checked`);
        return selected ? Number(selected.value) : null;
      });
    }

    (async () => {
      const status = await apiGetStatus(username);
      if (!status.ok) {
        lock.textContent = "Error: " + (status.error || "Unknown");
        return;
      }
      if (!allModulesComplete(status)) {
        lock.innerHTML = "<b>Locked.</b> Finish all modules first.";
        return;
      }

      renderQuestions();
      lock.style.display = "none";
      test.style.display = "block";
    })();

    submitBtn.onclick = async () => {
      const selected = getSelections();
      const unanswered = selected.filter(v => v === null).length;

      if (unanswered > 0) {
        result.innerHTML = `<b>Please answer all questions.</b> ${unanswered} unanswered.`;
        return;
      }

      let correct = 0;
      QUESTIONS.forEach((q, i) => {
        if (selected[i] === q.correctIndex) correct += 1;
      });

      const score = Math.round((correct / QUESTIONS.length) * 100);
      const passed = score >= PASSING_SCORE;

      result.innerHTML = "Logging score to Google Sheets…";

      const res = await apiLogTest(username, passed, score);

      if (!res.ok) {
        result.innerHTML = "<b>Error logging:</b> " + (res.error || "Unknown");
        return;
      }

      result.innerHTML = `<b>${passed ? "Passed" : "Did not pass"}.</b> Score: ${score}% (${correct}/${QUESTIONS.length}).`;
    };

    retakeBtn.onclick = () => {
      quizForm.querySelectorAll('input[type="radio"]').forEach(input => {
        input.checked = false;
      });
      result.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
  </script>
</body>
</html>
